services:
  - type: web
    name: docmind-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    # Standard plan is recommended due to HuggingFace model memory footprint (>512MB RAM)
    plan: standard
    disk:
      name: docmind-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: docmind-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: docmind-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: docmind-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: Dockerfile
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: docmind-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: docmind-db
    databaseName: docmind
    user: docmind_user
    plan: free

